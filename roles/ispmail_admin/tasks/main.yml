---
- name: Verifica che ispmail_fqdn e ispmail_admin_fqdn siano impostati
  ansible.builtin.assert:
    that:
      - ispmail_fqdn is defined
      - ispmail_fqdn | length > 0
      - ispmail_admin_fqdn | default('') | length > 0
    fail_msg: >
      ispmail_admin richiede ispmail_fqdn (stesso mail server di ispmail.sh)
      e ispmail_admin_fqdn (l'hostname dedicato del pannello, es.
      "ispmail.example.com": deve risolvere via DNS verso questo host ed
      essere coperto dal certificato TLS di ispmail_fqdn - SAN o wildcard).
    quiet: true

- name: Installa la dipendenza Python per i moduli MySQL di Ansible
  ansible.builtin.apt:
    name: python3-pymysql
    state: present

- name: Crea l'utente MariaDB per ISPmail Admin (permessi limitati, non ALL PRIVILEGES)
  community.mysql.mysql_user:
    name: "{{ ispmail_admin_db_user }}"
    host: "127.0.0.1"
    password: "{{ ispmail_admin_db_password }}"
    priv:
      "mailserver.*": "SELECT,UPDATE,INSERT,DELETE"
    login_unix_socket: /run/mysqld/mysqld.sock
    state: present

# Nessun HTTPS e nessun checksum pubblicati dal progetto per questo download:
# integrità non verificabile. Valutato e accettato esplicitamente prima di
# abilitare questo ruolo (vedi README).
- name: Scarica ISPmail Admin
  ansible.builtin.get_url:
    url: "{{ ispmail_admin_download_url }}"
    dest: "{{ ispmail_admin_archive_path }}"
    mode: "0600"

- name: Crea la directory di installazione
  ansible.builtin.file:
    path: "{{ ispmail_admin_install_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0750"

# Il tarball contiene ./ispmailadmin-<versione>/htdocs/...: strip-components=3
# (".", "ispmailadmin-<versione>", "htdocs") porta i file direttamente nella
# document root, senza sottodirectory intermedie.
- name: Estrai ISPmail Admin
  ansible.builtin.unarchive:
    src: "{{ ispmail_admin_archive_path }}"
    dest: "{{ ispmail_admin_install_dir }}"
    remote_src: true
    owner: www-data
    group: www-data
    extra_opts:
      - "--strip-components=3"

- name: Distribuisci la configurazione di ISPmail Admin
  ansible.builtin.template:
    src: config.inc.php.j2
    dest: "{{ ispmail_admin_install_dir }}/cfg/config.inc.php"
    owner: www-data
    group: www-data
    mode: "0640"

- name: Rimuovi il file di configurazione di esempio (contiene credenziali placeholder)
  ansible.builtin.file:
    path: "{{ ispmail_admin_install_dir }}/cfg/config.sample.inc.php"
    state: absent

# Vhost dedicato (sites-available, non conf-available: contiene dei veri
# <VirtualHost>, non solo frammenti condivisi), sul certificato wildcard
# già collegato da roles/ispmail in ispmail_cert_dir.
- name: Configura il vhost Apache dedicato di ISPmail Admin
  ansible.builtin.template:
    src: apache-ima.conf.j2
    dest: /etc/apache2/sites-available/ispmail-admin.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload apache

- name: Abilita il vhost Apache di ISPmail Admin
  ansible.builtin.command: a2ensite ispmail-admin
  args:
    creates: /etc/apache2/sites-enabled/ispmail-admin.conf
  notify: reload apache

- name: Verifica subito la sintassi di Apache (fail-fast, non aspettare l'handler)
  ansible.builtin.command: apache2ctl configtest
  changed_when: false

- name: Mostra dove trovare le credenziali di ISPmail Admin
  ansible.builtin.debug:
    msg: >
      ISPmail Admin è su https://{{ ispmail_admin_fqdn }}/, raggiungibile
      solo da {{ ispmail_admin_allow_networks | join(', ') }}. Utente:
      {{ ispmail_admin_login_user }}. Password admin e password del DB
      salvate sul controller Ansible in
      secrets/{{ ispmail_fqdn }}-ima-admin.txt e
      secrets/{{ ispmail_fqdn }}-ima-db.txt. Verifica che il DNS di
      {{ ispmail_admin_fqdn }} punti a questo host.
