---
# Questi default vengono sovrascritti da group_vars/all.yml.
# Sono qui solo come rete di sicurezza se il ruolo viene eseguito standalone.
harden_ssh: true
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_allow_users: []
ssh_allow_groups: ["sudo"]
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_banner_text: "Accesso riservato. Attivita' monitorata."

harden_create_admin_user: false
harden_admin_user: "admin"
harden_admin_pubkey: ""
harden_lock_root_password: true

# Accesso di emergenza indipendente da sudo: login SSH di root solo a
# chiave (mai password). Se true, imposta anche
# ssh_permit_root_login: "prohibit-password" (di default "no" = nessun
# login root via SSH, nemmeno con chiave).
harden_root_ssh_key_login: false
harden_root_pubkey: "{{ harden_admin_pubkey }}"

# Gestione di /etc/hosts (opt-in: di default il file non viene toccato).
# Le voci sono righe complete "IP nomi..."; usa SOLO indirizzi stabili
# (statici), mai IPv6 SLAAC che cambiano al cambio di MAC della VM.
common_manage_hosts: false
common_hosts_entries: []
# es.:
#   - "10.0.0.11        mail.example.com mail"
#   - "2001:db8::11     mail.example.com mail"

harden_sysctl: true
sysctl_enable_ip_forward: false

harden_kernel_modules: true
kernel_modules_blacklist: []

harden_pam: true
pam_password_remember: 5
pam_password_min_length: 12
pam_faillock_deny: 5
pam_faillock_unlock_time: 900

login_defs_pass_max_days: 365
login_defs_pass_min_days: 1
login_defs_pass_warn_age: 14

harden_auditd: true
harden_apparmor: true
harden_unattended_upgrades: true
unattended_upgrades_reboot_automatic: false
unattended_upgrades_reboot_time: "03:30"

harden_ntp: true
ntp_servers:
  - "0.debian.pool.ntp.org"
  - "1.debian.pool.ntp.org"

harden_remove_packages: true
packages_to_remove: []
