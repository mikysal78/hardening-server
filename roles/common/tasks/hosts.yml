---
# La webmail di mail01 è stata lenta per giorni a causa di un IPv6 SLAAC
# stantio lasciato a mano in /etc/hosts (Roundcube apre una connessione
# IMAP verso quel nome a ogni click, e gli stream PHP aspettano il timeout
# pieno sull'indirizzo morto prima di ripiegare sull'IPv4): da qui la
# scelta di gestire il file da Ansible con soli indirizzi statici.
- name: Gestisci /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
