---
# FQDN pubblico del mail server (es. "mail.example.com"). Obbligatorio:
# ci deve puntare il DNS pubblico ed è per questo dominio che ispmail.sh
# richiede il certificato Let's Encrypt e configura Postfix/Dovecot/Roundcube.
# Resta l'hostname dei PROTOCOLLI (SMTP/IMAP, myhostname di Postfix, ecc.)
# anche se imposti ispmail_webmail_fqdn sotto.
ispmail_fqdn: ""

# Hostname su cui è raggiungibile Roundcube via browser (ServerAlias in più
# rispetto a ispmail_fqdn nel vhost Apache). Di default coincide con
# ispmail_fqdn; impostalo solo se vuoi un hostname diverso per il webmail
# (es. "webmail.example.com"), che deve comunque essere coperto dal
# certificato TLS (SAN o wildcard) e risolvere via DNS verso questo host.
ispmail_webmail_fqdn: "{{ ispmail_fqdn }}"

ispmail_script_url: "https://workaround.org/ispmail.sh"
ispmail_script_path: "/usr/local/sbin/ispmail.sh"
ispmail_marker_file: "/root/.ispmail_installed"
ispmail_log_file: "/root/ispmail-install-{{ ispmail_fqdn }}.log"

# Le password generate da ispmail.sh (DB mailadmin/mailserver, rspamd webui)
# vengono stampate una sola volta e non sono più recuperabili altrimenti: il
# ruolo scarica il log dal server sul controller Ansible (di norma meno
# esposto del mail server) in questa directory locale, poi lo cancella dal
# server. La directory NON deve mai finire in un repo pubblico.
ispmail_local_secrets_dir: "{{ playbook_dir }}/secrets"

# Quota di default per casella (sintassi Dovecot: 3G, 500M, ...). Vale per
# tutte le caselle con quota=0 nel DB (il valore in byte nella colonna
# virtual_users.quota, impostabile da ISPmail Admin, la sovrascrive per la
# singola casella). ispmail.sh mette 5G: questo drop-in vince perché viene
# letto dopo (ordine alfabetico in conf.d).
ispmail_quota_default: "5G"

# Mittente della mail di benvenuto inviata con "ispmail-benvenuto
# utente@dominio" (default: postmaster del dominio dell'FQDN, es.
# postmaster@example.com per mail.example.com)
ispmail_welcome_from: "postmaster@{{ ispmail_fqdn.split('.', 1)[1] }}"

# --- Certificato TLS ---------------------------------------------------
# ispmail.sh usa ovunque nel codice il path standard di certbot
# (/etc/letsencrypt/live/<fqdn>/{fullchain,privkey}.pem) e chiama
# "certbot --apache" SOLO se quella directory non esiste già. Il
# certificato qui è provisionato dal ruolo ansible-dns (validazione DNS-01)
# che lo copia in /etc/ssl/acme/ con nomi file "piatti": il ruolo lo copia
# nel path standard PRIMA di eseguire ispmail.sh, che così rileva il
# certificato esistente e salta la propria chiamata a certbot.
ispmail_cert_dir: "/etc/letsencrypt/live/{{ ispmail_fqdn }}"

# Nome usato da ansible-dns per i file del certificato sotto /etc/ssl/acme/.
# Può NON coincidere con ispmail_fqdn: es. un certificato per il dominio
# apex "example.com" (anche wildcard) usato pure per "mail.example.com".
# Assicurati che il certificato copra davvero l'FQDN del mail server
# (SAN o wildcard), altrimenti client di posta e Roundcube segnaleranno
# un mismatch del nome nel certificato.
ispmail_cert_name: "{{ ispmail_fqdn }}"
ispmail_cert_fullchain_src: "/etc/ssl/acme/{{ ispmail_cert_name }}.fullchain.pem"
ispmail_cert_privkey_src: "/etc/ssl/acme/{{ ispmail_cert_name }}.key"
