---
- name: Verifica che sia stato indicato ispmail_fqdn
  ansible.builtin.assert:
    that:
      - ispmail_fqdn is defined
      - ispmail_fqdn | length > 0
    fail_msg: >
      Devi impostare ispmail_fqdn (es. "mail.example.com"): è l'FQDN pubblico per
      cui ispmail.sh richiede il certificato Let's Encrypt e configura
      Postfix/Dovecot/Roundcube. Passalo con -e ispmail_fqdn=... oppure
      valorizzalo in group_vars/mailservers.yml o host_vars/<host>.yml.
    quiet: true

- name: Verifica che il ruolo webserver (nginx) di questo repo non sia attivo
  ansible.builtin.assert:
    that:
      - not (role_webserver | default(false))
    fail_msg: >
      role_webserver=true installerebbe nginx sulle porte 80/443, in conflitto
      con Apache installato da ispmail.sh su questo stesso host. Disattivalo
      per gli host in [mailservers] prima di procedere.
    quiet: true

- name: Crea la directory del certificato se non esiste ancora (path standard certbot)
  ansible.builtin.file:
    path: "{{ ispmail_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ispmail_cert_fullchain_src != (ispmail_cert_dir + '/fullchain.pem')

# Link, non copia: ansible-dns/acme.sh rinnova il certificato riscrivendo
# periodicamente questi stessi file in /etc/ssl/acme/. Una copia statica
# smetterebbe di aggiornarsi al primo rinnovo - Postfix/Dovecot/Apache
# continuerebbero a usare il certificato vecchio (e alla fine scaduto).
# Col link vedono sempre il contenuto più recente, anche se acme.sh
# rimpiazza il file con una nuova rename atomica (il link segue il path,
# non l'inode). I permessi restano quelli impostati dal ruolo ansible-dns
# sui file sorgente: verifica che privkey non sia leggibile da chiunque.
- name: Collega il certificato dal path del ruolo ansible-dns, se diverso da quello standard
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "{{ ispmail_cert_fullchain_src }}", dest: "{{ ispmail_cert_dir }}/fullchain.pem" }
    - { src: "{{ ispmail_cert_privkey_src }}", dest: "{{ ispmail_cert_dir }}/privkey.pem" }
  when: item.src != item.dest

- name: Verifica che il certificato TLS sia già presente (provisionato es. dal ruolo ansible-dns)
  ansible.builtin.stat:
    path: "{{ ispmail_cert_dir }}/{{ item }}"
  register: ispmail_cert_stat
  loop:
    - fullchain.pem
    - privkey.pem

- name: Blocca se manca il certificato TLS
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >
      Manca {{ item.item }} in {{ ispmail_cert_dir }}: esegui prima il ruolo
      ansible-dns (o comunque quello che provisiona il certificato Let's
      Encrypt) per questo FQDN. ispmail.sh usa quel path per Postfix,
      Dovecot e Apache e chiamerebbe "certbot --apache" da solo se non lo
      trovasse, cosa che qui non vogliamo (il certificato è gestito altrove).
    quiet: true
  loop: "{{ ispmail_cert_stat.results }}"
  loop_control:
    label: "{{ item.item }}"

# ispmail.sh configura Postfix in modo incrementale (postconf) ma non ne
# genera main.cf da zero: si aspetta un pacchetto postfix già preconfigurato
# in modalità "Internet Site", esattamente come fa roles/mailserver/tasks/main.yml
- name: Preconfigura debconf per un'installazione non interattiva di postfix
  ansible.builtin.debconf:
    name: postfix
    question: "{{ item.q }}"
    value: "{{ item.v }}"
    vtype: "{{ item.t }}"
  loop:
    - { q: "postfix/main_mailer_type", v: "Internet Site", t: "select" }
    - { q: "postfix/mailname", v: "{{ ispmail_fqdn }}", t: "string" }

- name: Installa il pacchetto postfix di base (preconfigurato via debconf sopra)
  ansible.builtin.apt:
    name: postfix
    state: present
    update_cache: true

- name: Scarica lo script di installazione ispmail.sh
  ansible.builtin.get_url:
    url: "{{ ispmail_script_url }}"
    dest: "{{ ispmail_script_path }}"
    mode: "0700"
    owner: root
    group: root
    force: true

# ispmail.sh non chiama mai da solo "a2ensite"/"a2enmod ssl": si aspetta che
# sia stato "certbot --apache" (chiamato prima di apache_config() nello
# script) ad abilitare mod_ssl e il vhost 000-default-le-ssl.conf. Visto che
# qui il certificato è già presente e quella chiamata a certbot viene quindi
# saltata dallo script stesso, senza questa patch apache_config() fallirebbe
# al controllo finale "curl https://$FQDN" (Roundcube non raggiungibile) e
# l'intera installazione si fermerebbe lì, prima di TLS relay/rspamd/DKIM.
- name: Patch ispmail.sh per abilitare comunque mod_ssl e il vhost Apache
  ansible.builtin.blockinfile:
    path: "{{ ispmail_script_path }}"
    marker: "# {mark} ANSIBLE - abilita mod_ssl e vhost anche senza certbot"
    insertbefore: '^\s*a2enmod proxy_http -q\s*$'
    block: |
      a2enmod ssl -q
      a2ensite 000-default-le-ssl -q

# Il vhost 000-default-le-ssl.conf scritto da apache_config() include
# /etc/letsencrypt/options-ssl-apache.conf, che normalmente crea certbot
# stesso al primo utilizzo del plugin apache. Senza certbot quel file non
# esiste, e apache2 si rifiuta di (ri)partire ("Could not open configuration
# file /etc/letsencrypt/options-ssl-apache.conf: No such file or directory").
# force: false -> se un giorno certbot gira davvero non sovrascrive il suo.
- name: Crea options-ssl-apache.conf se manca (normalmente lo crea certbot)
  ansible.builtin.template:
    dest: /etc/letsencrypt/options-ssl-apache.conf
    src: options-ssl-apache.conf.j2
    force: false
    owner: root
    group: root
    mode: "0644"

- name: Esegui ispmail.sh (una sola volta - installa un intero mail server, richiede diversi minuti)
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    echo | {{ ispmail_script_path }} -f {{ ispmail_fqdn }} 2>&1 | tee {{ ispmail_log_file }}
    touch {{ ispmail_marker_file }}
  args:
    executable: /bin/bash
    creates: "{{ ispmail_marker_file }}"
  register: ispmail_run

- name: Crea la directory locale per i segreti generati da ispmail.sh
  ansible.builtin.file:
    path: "{{ ispmail_local_secrets_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: ispmail_run is changed

# Scarica il log (password DB mailadmin/mailserver + rspamd webui, stampate
# dallo script UNA sola volta) sul controller Ansible, che di norma è meno
# esposto del mail server stesso, e rimuove la copia dal server.
- name: Scarica sul controller il log con le password generate
  ansible.builtin.fetch:
    src: "{{ ispmail_log_file }}"
    dest: "{{ ispmail_local_secrets_dir }}/{{ ispmail_fqdn }}.log"
    flat: true
  when: ispmail_run is changed

# fetch non garantisce permessi restrittivi sul file scaricato (segue lo
# umask del controller): forziamo 0600 visto che contiene password in chiaro.
- name: Restringi i permessi del log scaricato in locale
  ansible.builtin.file:
    path: "{{ ispmail_local_secrets_dir }}/{{ ispmail_fqdn }}.log"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: ispmail_run is changed

- name: Rimuovi la copia del log dal server (resta solo sul controller)
  ansible.builtin.file:
    path: "{{ ispmail_log_file }}"
    state: absent
  when: ispmail_run is changed

- name: Estrai il riepilogo finale (URL e password) dall'output di ispmail.sh
  ansible.builtin.set_fact:
    ispmail_summary: "{{ ispmail_run.stdout.split('PLEASE NOTE:')[1] | trim }}"
  when: ispmail_run is changed and "PLEASE NOTE:" in ispmail_run.stdout

- name: Riepilogo finale - link di accesso e password generate
  ansible.builtin.debug:
    msg: "{{ ispmail_summary.split('\n') }}"
  when: ispmail_summary is defined

- name: Dove trovare di nuovo queste informazioni
  ansible.builtin.debug:
    msg: >
      Questo riepilogo è stato salvato anche sul controller Ansible in
      {{ ispmail_local_secrets_dir }}/{{ ispmail_fqdn }}.log (permessi 0600)
      ed è stato rimosso dal server. Copialo in un password manager e poi
      cancella anche quel file locale.
  when: ispmail_run is changed
